# Katalaveno Sentence Bank
# ========================
# Format guide:
#
#  language: <source language of the sentences below>
#
#  subjects:
#    SubjectName:
#      sentences:
#        - First sentence in the source language.
#        - Second sentence.
#
#    MetaSubjectName:          # a subject that groups other subjects
#      includes:
#        - SubjectName
#        - AnotherSubject
#
# Notes:
#  - All subjects (including meta) appear in the subject picker.
#  - Meta subjects stream sentences from all included leaf subjects.
#  - Translations are fetched via AI once and cached locally.

language: English

# Auto-mode timing
auto_show_delay: 3       # seconds to display the source sentence before revealing the translation
auto_post_tts_delay: 3   # seconds to wait after TTS finishes before advancing to the next sentence
auto_source_pause: 2     # (only when "speak source" is on) seconds to pause after speaking the source sentence before revealing the translation
tts_repeat_delay: 3      # seconds between TTS repetitions of the translation (when repeat count > 1)
tts_repeat_count: 3      # how many times to play the translation TTS (1 = once)
override_local:   0      # read from the CLOUD file when a sentence-bank URL is set:
                         #   0 = append the cloud bank onto this local one (subjects/sentences merged)
                         #   1 = the cloud bank completely replaces this local one
                         # If the cloud file omits this key, this local value is used.

subjects:

  Greetings:
    sentences:
      - Hello, how are you?
      - Good morning, I hope you have a great day.
      - Nice to meet you.
      - It was nice to meet you
      - Good evening, how was your day?
      - Goodbye, see you tomorrow.
      - How is everything going?
      - Thank you very much.
      - You are welcome.

  Introductions:
    sentences:
      - My name is Alexis.
      - I am from France.
      - I am learning this language.
      - I speak a little.
      - Could you please speak more slowly?
      - I do not understand, can you repeat that?
      - What is your name?
      - Where are you from?

  Numbers and Time:
    sentences:
      - What time is it?
      - It is three o'clock in the afternoon.
      - Today is Monday.
      - The meeting is at nine in the morning.
      - It takes about twenty minutes to walk there.
      - The store opens at eight and closes at ten.
      - My birthday is in July.
      - How many do you want?
      - It is 17 minutes to 10
      - It is 11 and a quarter
      - We'll meet in 20 minutes
      - Let's leave at 5 minutes to 9

  Food and Drink:
    sentences:
      - I would like a coffee, please.
      - Do you have a table for two?
      - The menu, please.
      - What do you recommend?
      - I am vegetarian.
      - She is a vegeterian.
      - he is a vegan.
      - The bill, please.
      - This is delicious.
      - I am hungry, let us eat something.
      - Can I have a glass of water?
      - We would like to order now.
      - It was a little too salty
      - I'm full, thank you
      - Can I have another one?

  Shopping:
    sentences:
      - How much does this cost?
      - Do you have this in a different size?
      - I am just looking, thank you.
      - Can I pay by card?
      - Do you have a bag for this?
      - I would like to return this item.
      - Where is the nearest supermarket?
      - It is too expensive for me.

  Directions:
    sentences:
      - Excuse me, where is the bus station?
      - Turn left at the traffic lights.
      - Go straight ahead for two blocks.
      - Is it far from here?
      - Can you show me on the map?
      - Take the second street on the right.
      - The pharmacy is next to the bank.
      - How do I get to the city center?
      - Go left, left, left and then straight
      - Go left, right, left, right and it will be there
      - The bus station is about 20 meters ahead
      - The church is 937 meters uphill

  Health:
    sentences:
      - I do not feel well.
      - I need to see a doctor.
      - I have a headache.
      - Is there a pharmacy nearby?
      - I am allergic to penicillin.
      - Call an ambulance, please.
      - Where is the nearest hospital?
      - I need my prescription filled.

  Travel:
    sentences:
      - I would like a ticket to the airport, please.
      - At what time does the next train leave?
      - Is this seat taken?
      - My luggage is lost.
      - I need to check in for my flight.
      - Where can I find a taxi?
      - How long is the journey?
      - I have a reservation under the name Arnold.
      - You must visit this island
      - Did you climb the mountain?

  Work and Daily Life:
    sentences:
      - I work in an office downtown.
      - I start work at nine every morning.
      - I finish work at six in the evening.
      - I take the subway to work.
      - I have a meeting this afternoon.
      - I work from home on Fridays.
      - My colleague is very helpful.
      - I am on a deadline today
      - It is very quiet today
      - The music is too loud
      - The pigeons are noisy

  Weather:
    sentences:
      - What is the weather like today?
      - It is very hot and humid.
      - It looks like it will rain later.
      - I should bring an umbrella.
      - The forecast says it will be sunny.
      - It is cold outside, dress warmly.
      - There is a storm coming tonight.
      - What a beautiful day it is!

  # ── Meta subjects ──────────────────────────────────────────
  # These combine sentences from multiple leaf subjects.

  Beginner Essentials:
    includes:
      - Greetings
      - Introductions
      - Numbers and Time

  Out and About:
    includes:
      - Food and Drink
      - Shopping
      - Directions

  Full Mix:
    includes:
      - Greetings
      - Introductions
      - Numbers and Time
      - Food and Drink
      - Shopping
      - Directions
      - Health
      - Travel
      - Work and Daily Life
      - Weather
      - At the fishmonger
      - At the butcher
      - At the gym
      - My misc

